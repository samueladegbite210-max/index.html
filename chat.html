<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Life Assistant - Chat</title>

<link rel="stylesheet" href="style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0B0F1A;
    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding-bottom:90px;
}

.header{
    background:#111827;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    max-width:80%;
    word-wrap:break-word;
}

.ai{
    background:#1F2937;
    margin-right:auto;
}

.user{
    background:#2563EB;
    margin-left:auto;
    text-align:right;
}

.bottom{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

.bottom input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.bottom button{
    background:#2563EB;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

.bottom button:hover{
    background:#1D4ED8;
}
</style>

</head>

<body>


<header class="header">
🤖 AI Assistant
</header>

<div class="container">

<div id="chatBox" class="card" style="height:420px;overflow-y:auto;text-align:left;">

<p><strong>🤖 AI:</strong> Hello Samuel! How can I help you today?</p>

</div>

<input
type="text"
id="userInput"
placeholder="Ask me anything...">

<button onclick="sendMessage()">
Send
</button>
<button onclick="startVoice()">
🎤 Speak
</button>
</div>

<div class="navbar">
<a href="dashboard.html">🏠<br>Home</a>
<a href="chat.html">🤖<br>AI</a>
<a href="notes.html">📝<br>Notes</a>
<a href="calendar.html">📅<br>Calendar</a>
<a href="profile.html">👤<br>Profile</a>
</div>

<script>

function sendMessage(){

    const input = document.getElementById("userInput");
    const chat = document.getElementById("chatBox");

    const text = input.value.trim();

    if(text === "") return;

    chat.innerHTML += `
        <div class="message user">
            ${text}
        </div>
    `;

    input.value = "";
    input.focus();

    chat.scrollTop = chat.scrollHeight;

    setTimeout(function(){

        let reply = "";

const msg = text.toLowerCase();

if(msg.includes("hello") || msg.includes("hi")){
    reply = "👋 Hello Samuel! How can I help you today?";
}
    else if(msg.includes("open tasks")){
    reply = "✅ Opening Tasks...";
    setTimeout(function(){
        window.location.href = "tasks.html";
    },1000);
}
else if(msg.includes("open notes")){
    reply = "📝 Opening Notes...";
    setTimeout(function(){
        window.location.href = "notes.html";
    },1000);
}
else if(msg.includes("open calendar")){
    reply = "📅 Opening Calendar...";
    setTimeout(function(){
        window.location.href = "calendar.html";
    },1000);
}
else if(msg.includes("open goals")){
    reply = "🎯 Opening Goals...";
    setTimeout(function(){
        window.location.href = "goals.html";
    },1000);
    else if(msg.includes("how many tasks")){
    const count = document.getElementById("taskCount") ?
    document.getElementById("taskCount").textContent :
    localStorage.getItem("tasks");

    reply = "✅ You currently have tasks saved in your planner.";
}

else if(msg.includes("how many goals")){
    reply = "🎯 Check your Goals page. You're making great progress!";
}

else if(msg.includes("next event")){
    reply = "📅 Your next scheduled event is shown on your Dashboard.";
}

else if(msg.includes("motivate me")){
    reply = "💙 Success comes from small consistent actions. Keep going, Samuel!";
}

else if(msg.includes("good morning")){
    reply = "🌅 Good morning, Samuel! I hope you have an amazing day.";
}

else if(msg.includes("good night")){
    reply = "🌙 Good night, Samuel. Get some good rest!";
}
}
else if(msg.includes("open profile")){
    reply = "👤 Opening Profile...";
    setTimeout(function(){
        window.location.href = "profile.html";
    },1000);
}
else if(msg.includes("task")){
    reply = "✅ You can manage all your tasks from the Tasks page.";
}
else if(msg.includes("goal")){
    reply = "🎯 Your goals help keep you focused. Keep going!";
}
else if(msg.includes("calendar") || msg.includes("event")){
    reply = "📅 You can view and manage your events in the Calendar page.";
}
else if(msg.includes("note")){
    reply = "📝 Your notes are saved automatically.";
}
else if(msg.includes("thank")){
    reply = "😊 You're welcome, Samuel!";
}
else{
    reply = "🤖 I'm still learning. A smarter AI assistant is coming soon!";
}

chat.innerHTML += `
<div class="message ai">
${reply}
</div>
`;

        chat.scrollTop = chat.scrollHeight;

    },1000);
}

document.getElementById("userInput").addEventListener("keypress", function(event){
    if(event.key === "Enter"){
        sendMessage();
    }
});
    function startVoice(){

    const recognition = new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event){

        document.getElementById("userInput").value =
        event.results[0][0].transcript;

        sendMessage();

    };

}
    </script>

</body>
</html>
