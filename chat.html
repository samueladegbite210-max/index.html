<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Life Assistant - Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0B0F1A;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    background:#111827;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    max-width:80%;
    word-wrap:break-word;
}

.ai{
    background:#1F2937;
}

.user{
    background:#2563EB;
    margin-left:auto;
    text-align:right;
}

.bottom{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

.bottom input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.bottom button{
    background:#2563EB;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>
    <div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>
<body>

<div class="header">
🤖 AI Life Assistant
</div>

<div class="chat" id="chat">

<div class="message ai">
👋 Hello Samuel! How can I help you today?
</div>

</div>

<div class="bottom">

<input
type="text"
id="message"
placeholder="Ask me anything..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

<script>

function sendMessage(){

const input=document.getElementById("message");
const chat=document.getElementById("chat");

const text=input.value.trim();

if(text==="") return;

chat.innerHTML += `
<div class="message user">
${text}
</div>
`;

input.value="";

chat.scrollTop=chat.scrollHeight;

setTimeout(function(){

chat.innerHTML += `
<div class="message ai">
🤖 You said: "${text}"

<br><br>

I'm still under development.

Soon I'll become a real AI assistant.
</div>
`;

chat.scrollTop=chat.scrollHeight;

},1000);

}

</script>

</body>
</html>
