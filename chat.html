<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.chat{
    height:60vh;
    overflow:auto;
    padding:20px;
}

.ai{
    background:#1F2937;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
}

.user{
    background:#3B82F6;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    text-align:right;
}

.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    display:flex;
    padding:15px;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    background:#3B82F6;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 18px;
}
</style>
</head>

<body>

<div class="header">
🤖 AI Assistant
</div>

<div class="chat" id="chat">

<div class="ai">
Hello Samuel! 👋 How can I help you today?
</div>

</div>

<div class="bottom">

<input
id="message"
placeholder="Ask me anything..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

<script>
function sendMessage(){

const input = document.getElementById("message");
const chat = document.getElementById("chat");

if(input.value.trim() === "") return;

const userText = input.value;

chat.innerHTML += `
<div class="user">
${userText}
</div>
`;

input.value = "";

chat.scrollTop = chat.scrollHeight;

setTimeout(function(){

chat.innerHTML += `
<div class="ai">
🤖 You said: "${userText}"<br><br>
I'm still under development. Soon I'll become a real AI assistant!
</div>
`;

chat.scrollTop = chat.scrollHeight;

},1000);




}

</script>

</body>
</html>
