<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Life Assistant - Chat</title>

<link rel="stylesheet" href="style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0B0F1A;
    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding-bottom:90px;
}

.header{
    background:#111827;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    max-width:80%;
    word-wrap:break-word;
}

.ai{
    background:#1F2937;
    margin-right:auto;
}

.user{
    background:#2563EB;
    margin-left:auto;
    text-align:right;
}

.bottom{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

.bottom input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.bottom button{
    background:#2563EB;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

.bottom button:hover{
    background:#1D4ED8;
}
</style>

</head>

<body>


<header class="header">
🤖 AI Assistant
</header>

<div class="container">

<div id="chatBox" class="card" style="height:420px;overflow-y:auto;text-align:left;">

<p><strong>🤖 AI:</strong> Hello Samuel! How can I help you today?</p>

</div>

<input
type="text"
id="userInput"
placeholder="Ask me anything...">

<button onclick="sendMessage()">
Send
</button>
<button onclick="startVoice()">
🎤 Speak
</button>
</div>

<div class="navbar">
<a href="dashboard.html">🏠<br>Home</a>
<a href="chat.html">🤖<br>AI</a>
<a href="notes.html">📝<br>Notes</a>
<a href="calendar.html">📅<br>Calendar</a>
<a href="profile.html">👤<br>Profile</a>
</div>

<script src="helpers.js"></script>
<script src="conversation.js"></script>
<script src="knowledge.js"></script>
<script src="calculator.js"></script>
<script src="datetime.js"></script>
<script src="tasks.js"></script>
<script src="goals.js"></script>
<script src="notes.js"></script>
<script src="events.js"></script>
<script src="memory.js"></script>
<script src="natural.js"></script>
<script src="weather.js"></script>

<script src="chat.js"></script>
    
</body>
</html>
