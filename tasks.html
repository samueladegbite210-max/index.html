
<!DOCTYPE html>

<title>Tasks</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    ✅ My Tasks
</header>

<div class="container">

    <div class="card">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task">

        <select id="taskPriority">
            <option value="High">🔴 High</option>
            <option value="Medium">🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="card">

        <ul id="taskList"></ul>

    </div>

</div>
