<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input,
textarea,
select{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;

}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.event{
    background:#1F2937;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    📅 Calendar
</header>

<div class="container">
<div class="card">

    <h2>📅 July 2026</h2>

    <div class="calendar-grid">

        <div class="day-name">Sun</div>
        <div class="day-name">Mon</div>
        <div class="day-name">Tue</div>
        <div class="day-name">Wed</div>
        <div class="day-name">Thu</div>
        <div class="day-name">Fri</div>
        <div class="day-name">Sat</div>

        <div class="day empty"></div>
        <div class="day empty"></div>

        <div class="day">1</div>
        <div class="day">2</div>
        <div class="day">3</div>
        <div class="day">4</div>
        <div class="day">5</div>

        <div class="day">6</div>
        <div class="day">7</div>
        <div class="day">8</div>
        <div class="day">9</div>
        <div class="day">10</div>
        <div class="day">11</div>
        <div class="day">12</div>

        <div class="day">13</div>
        <div class="day">14</div>
        <div class="day">15</div>
        <div class="day">16</div>
        <div class="day">17</div>
        <div class="day">18</div>
        <div class="day">19</div>

        <div class="day">20</div>
        <div class="day">21</div>
        <div class="day">22</div>
        <div class="day">23</div>
        <div class="day">24</div>
        <div class="day">25</div>
        <div class="day">26</div>

        <div class="day">27</div>
        <div class="day">28</div>
        <div class="day">29</div>
        <div class="day">30</div>
        <div class="day">31</div>

    </div>

</div>
    <div class="card">

        <h2>📅 Add New Event</h2>

        <input
            type="text"
            id="eventTitle"
            placeholder="Event Title">

        <input
            type="date"
            id="eventDate">

        <input
            type="time"
            id="eventTime">

        <input
            type="text"
            id="eventLocation"
            placeholder="Location">

        <textarea
            id="eventNotes"
            placeholder="Notes"></textarea>

        <select id="eventReminder">
            <option value="none">🔕 No Reminder</option>
            <option value="10">10 Minutes Before</option>
            <option value="30">30 Minutes Before</option>
            <option value="60">1 Hour Before</option>
            <option value="1440">1 Day Before</option>
        </select>

        <select id="eventRepeat">
            <option value="none">No Repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
        </select>

        <button onclick="addEvent()">
    Save Event
</button>

    </div>

    <div class="card">

        <h2>📆 Upcoming Events</h2>

        <ul id="eventList"></ul>

    </div>

</div>

<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

<script>

let events = JSON.parse(localStorage.getItem("events")) || [];

const eventList = document.getElementById("eventList");

// Load events when page opens
renderEvents();

function addEvent() {

    const title = document.getElementById("eventTitle").value.trim();
    const date = document.getElementById("eventDate").value;
    const time = document.getElementById("eventTime").value;
    const location = document.getElementById("eventLocation").value.trim();
    const notes = document.getElementById("eventNotes").value.trim();
    const reminder = document.getElementById("eventReminder").value;
    const repeat = document.getElementById("eventRepeat").value;

    if (title === "" || date === "") {
        alert("Please enter an Event Title and Date.");
        return;
    }

    const newEvent = {
        title: title,
        date: date,
        time: time,
        location: location,
        notes: notes,
        reminder: reminder,
        repeat: repeat
    };

    events.push(newEvent);

    localStorage.setItem("events", JSON.stringify(events));

    renderEvents();

    // Clear form
    document.getElementById("eventTitle").value = "";
    document.getElementById("eventDate").value = "";
    document.getElementById("eventTime").value = "";
    document.getElementById("eventLocation").value = "";
    document.getElementById("eventNotes").value = "";
    document.getElementById("eventReminder").value = "none";
    document.getElementById("eventRepeat").value = "none";

    alert("✅ Event saved successfully!");

}

function renderEvents() {

    eventList.innerHTML = "";

    if (events.length === 0) {
        eventList.innerHTML = "<li>No upcoming events.</li>";
        return;
    }

    events.forEach(function(event, index){

        const li = document.createElement("li");

        li.className = "event";

        li.innerHTML = `
            <strong>${event.title}</strong><br>
            📅 ${event.date}
            ${event.time ? "<br>🕒 " + event.time : ""}
            ${event.location ? "<br>📍 " + event.location : ""}
            ${event.notes ? "<br>📝 " + event.notes : ""}
            <br><br>

            <button onclick="deleteEvent(${index})">
                🗑️ Delete
            </button>
        `;

        eventList.appendChild(li);

    });

}

function deleteEvent(index){

    if(confirm("Delete this event?")){

        events.splice(index,1);

        localStorage.setItem("events", JSON.stringify(events));

        renderEvents();

    }
    
}
    
</script>

</body>
</html>
