<header>
📅 Calendar
</header>

<div class="container">

<input
type="date"
id="date">

<input
type="text"
id="event"
placeholder="Enter an event">

<button onclick="saveEvent()">
Save Event
</button>

<div id="events"></div>

</div>

<script>

const eventsDiv=document.getElementById("events");

function loadEvents(){

eventsDiv.innerHTML=localStorage.getItem("events") || "";

}

loadEvents();

function saveEvent(){

const date=document.getElementById("date").value;

const event=document.getElementById("event").value;

if(date==="" || event==="") return;

eventsDiv.innerHTML += `
<div class="event">
📅 <b>${date}</b><br>
${event}
</div>
`;

localStorage.setItem("events",eventsDiv.innerHTML);

document.getElementById("event").value="";

}

</script>
