<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input,
textarea,
select{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;

}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.event{
    background:#1F2937;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    📅 Calendar
</header>

<div class="container">

    <div class="card">

        <h2>📅 Add New Event</h2>

        <input
            type="text"
            id="eventTitle"
            placeholder="Event Title">

        <input
            type="date"
            id="eventDate">

        <input
            type="time"
            id="eventTime">

        <input
            type="text"
            id="eventLocation"
            placeholder="Location">

        <textarea
            id="eventNotes"
            placeholder="Notes"></textarea>

        <select id="eventReminder">
            <option value="none">🔕 No Reminder</option>
            <option value="10">10 Minutes Before</option>
            <option value="30">30 Minutes Before</option>
            <option value="60">1 Hour Before</option>
            <option value="1440">1 Day Before</option>
        </select>

        <select id="eventRepeat">
            <option value="none">No Repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
        </select>

        <button onclick="testButton()">
    Save Event
</button>

    </div>

    <div class="card">

        <h2>📆 Upcoming Events</h2>

        <ul id="eventList"></ul>

    </div>

</div>

<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

<script>

let events = JSON.parse(localStorage.getItem("events")) || [];

const eventList = document.getElementById("eventList");

renderEvents();
function testButton() {
    alert("Button is working!");
}
function addEvent() {

    alert("1");

    const title = document.getElementById("eventTitle").value.trim();

    alert("2");

    const date = document.getElementById("eventDate").value;

    alert("3");

    const time = document.getElementById("eventTime").value;

    alert("4");

    const location = document.getElementById("eventLocation").value.trim();

    alert("5");
    if (title === "" || date === "") {
        alert("Please enter an Event Title and Date.");
        return;
    }

    events.push({
        title: title,
        date: date,
        time: time,
        location: location,
        notes: notes,
        reminder: reminder,
        repeat: repeat
    });

    localStorage.setItem("events", JSON.stringify(events));

    renderEvents();

    document.getElementById("eventTitle").value = "";
    document.getElementById("eventDate").value = "";
    document.getElementById("eventTime").value = "";
    document.getElementById("eventLocation").value = "";
    document.getElementById("eventNotes").value = "";
    document.getElementById("eventReminder").value = "none";
    document.getElementById("eventRepeat").value = "none";
}

function renderEvents() {

    eventList.innerHTML = "";
if (events.length === 0) {
    eventList.innerHTML = "<p>No upcoming events.</p>";
    return;
}
    events.forEach((event, index) => {

        const li = document.createElement("div");
li.className = "event";

        li.innerHTML = `
            <strong>${event.title}</strong><br>
            📅 ${event.date}
            ${event.time ? "<br>🕒 " + event.time : ""}
            ${event.location ? "<br>📍 " + event.location : ""}
            ${event.notes ? "<br>📝 " + event.notes : ""}
            <br><br>
            <button onclick="deleteEvent(${index})">🗑️ Delete</button>
        `;

        eventList.appendChild(li);

    });

}

function deleteEvent(index) {

    events.splice(index, 1);

    localStorage.setItem("events", JSON.stringify(events));

    renderEvents();

}

</script>

</body>
</html>
