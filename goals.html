    background:#111827;

    padding:20px;
}

    width:100%;

    margin-bottom:15px;
}

<body>
    </html>

<header>🎯 Goals</header>

<div class="container">

<input
id="goal"
placeholder="Enter a new goal">

<button onclick="saveGoal()">Add Goal</button>

<div id="goals"></div>

</div>

<script>

const goals=document.getElementById("goals");

goals.innerHTML=localStorage.getItem("goals") || "";

function saveGoal(){

const input=document.getElementById("goal");

if(input.value.trim()==="") return;

goals.innerHTML += `
<div class="goal">
🎯 ${input.value}
</div>
`;

localStorage.setItem("goals",goals.innerHTML);

input.value="";

}

</script>

</body>
