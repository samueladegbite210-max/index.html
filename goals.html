<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goals - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.goal{
    background:#1F2937;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<header>
🎯 My Goals
</header>

<div class="container">

<div class="card">

<input
type="text"
id="goalInput"
placeholder="Enter a new goal">

<button onclick="addGoal()">
Add Goal
</button>

</div>

<div class="card">

<ul id="goalList"></ul>

</div>

</div>

<div class="navbar">

<a href="dashboard.html">🏠<br>Home</a>

<a href="chat.html">🤖<br>AI</a>

<a href="tasks.html">✅<br>Tasks</a>

<a href="calendar.html">📅<br>Calendar</a>

<a href="profile.html">👤<br>Profile</a>

</div>

<script src="goals.js"></script>
    
</body>
</html>
