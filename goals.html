<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goals - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.goal{
    background:#1F2937;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<header>
🎯 My Goals
</header>

<div class="container">

<div class="card">

<h2>🎯 Add New Goal</h2>

<input
type="text"
id="goalTitle"
placeholder="Goal Title">

<textarea
id="goalDescription"
placeholder="Describe your goal..."></textarea>

<input
type="date"
id="goalDeadline">

<select id="goalCategory">

<option value="Personal">Personal</option>

<option value="Work">Work</option>

<option value="School">School</option>

<option value="Health">Health</option>

<option value="Finance">Finance</option>

</select>

<button onclick="saveGoal()">
💾 Save Goal
</button>

</div>

<div class="card">

<h2>📊 Goal Summary</h2>

<p>Total Goals:
<span id="totalGoals">0</span></p>

<p>Completed:
<span id="completedGoals">0</span></p>

<p>Pending:
<span id="pendingGoals">0</span></p>

</div>

<div class="card">

<input
type="text"
id="searchGoal"
placeholder="🔍 Search Goals">

</div>

<div class="card">

<div id="goalList"></div>

</div>

</div>
<div class="navbar">

<a href="dashboard.html">🏠<br>Home</a>

<a href="chat.html">🤖<br>AI</a>

<a href="tasks.html">✅<br>Tasks</a>

<a href="calendar.html">📅<br>Calendar</a>

<a href="profile.html">👤<br>Profile</a>

</div>

<script src="goals.js"></script>
    
</body>
</html>
