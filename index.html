<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-emerald-700 p-6 rounded-3xl text-white mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-brain text-4xl"></i>
                    <div>
                        <h1 class="text-3xl font-bold">LifeAI</h1>
                        <p class="text-emerald-100">Global AI Life Assistant</p>
                    </div>
                </div>
                <select id="language" onchange="changeLanguage()" class="bg-white text-black rounded-2xl px-4 py-2 text-sm">
                    <option value="en">English</option>
                    <option value="yo">Yoruba</option>
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="fr">French</option>
                </select>
            </div>
        </header>

        <div class="flex border-b mb-6">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Budget</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Goals</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let currentLang = "en";
        const translations = {
            en: { newTask: "+ New Task", tasks: "Tasks", budget: "Budget", goals: "Goals" },
            yo: { newTask: "+ Iṣẹ Tuntun", tasks: "Awọn Iṣẹ", budget: "Isuna", goals: "Awọn Ibi" },
            ha: { newTask: "+ Sabon Aiki", tasks: "Ayyuka", budget: "Kasafin Kudi", goals: "Manufa" },
            ig: { newTask: "+ Ọrụ Ọhụrụ", tasks: "Ọrụ", budget: "Ọnụ Ego", goals: "Ebumnuche" },
            fr: { newTask: "+ Nouvelle Tâche", tasks: "Tâches", budget: "Budget", goals: "Objectifs" }
        };

        function changeLanguage() {
            currentLang = document.getElementById('language').value;
            switchTab(0); // Refresh current tab
        }

        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            const t = translations[currentLang];
            if (n === 0) {
                content.innerHTML = `
                    <button onclick="addTask()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl mb-6">${t.newTask}</button>
                    <div id="task-list" class="space-y-3"></div>
                `;
                renderTasks();
            } else if (n === 1) {
                content.innerHTML = `<p class="text-center py-12">${t.budget} coming soon</p>`;
            } else {
                content.innerHTML = `<p class="text-center py-12">${t.goals} coming soon</p>`;
            }
        }

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map((t,i) => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})">
                        <span class="${t.done?'line-through':''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-red-500">🗑</button>
                </div>
            `).join('');
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function deleteTask(i) {
            if(confirm("Delete?")) {
                tasks.splice(i,1);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        function addTask() {
            const text = prompt("New task?");
            if(text) {
                tasks.push({text, done:false});
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
