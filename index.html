<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-emerald-700 p-6 rounded-3xl text-white mb-6">
            <div class="flex justify-between">
                <div class="flex items-center gap-3">
                    <i class="fas fa-brain text-4xl"></i>
                    <div>
                        <h1 class="text-3xl font-bold">LifeAI</h1>
                        <p>Global AI Life Assistant</p>
                    </div>
                </div>
                <button onclick="toggleDark()" class="text-3xl">🌙</button>
            </div>
        </header>

        <div class="bg-emerald-600 text-white p-6 rounded-3xl mb-8">
            <p id="ai-text" class="italic">"Speak to add tasks now!"</p>
        </div>

        <div class="flex border-b mb-6">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Streak</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Settings</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let streak = parseInt(localStorage.getItem('streak')) || 7;

        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            if (n === 0) {
                content.innerHTML = `<button onclick="addTaskVoice()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl">🎤 Speak to Add Task</button>`;
            } else if (n === 1) {
                content.innerHTML = `<div class="text-center py-12"><div class="text-6xl">🔥</div><div class="text-5xl font-bold">${streak}</div><p>Day Streak</p></div>`;
            } else {
                content.innerHTML = `<button onclick="resetData()" class="w-full py-4 bg-red-600 text-white rounded-3xl">Reset All Data</button>`;
            }
        }

        function addTaskVoice() {
            const text = prompt("What task do you want to add? (Voice in full app)");
            if(text) alert("Task added: " + text);
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        function resetData() {
            if(confirm("Reset all data?")) localStorage.clear();
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
