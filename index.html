<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-4xl font-bold text-green-700 mb-8">LifeAI</h1>

        <button onclick="addTask()" class="w-full py-5 bg-green-600 text-white rounded-3xl text-lg mb-8">+ New Task</button>

        <div id="task-list" class="space-y-4"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="bg-white p-5 rounded-3xl flex justify-between items-center">
                    <span>${t}</span>
                    <button onclick="deleteTask(${i})" class="text-red-500">🗑</button>
                </div>
            `).join('');
        }

        function addTask() {
            const text = prompt("New task?");
            if (text) {
                tasks.push(text);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                render();
            }
        }

        function deleteTask(i) {
            tasks.splice(i, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
        }

        render();
    </script>
</body>
</html>
