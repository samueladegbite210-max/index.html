<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-emerald-700 p-6 rounded-3xl text-white mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-brain text-4xl"></i>
                    <div>
                        <h1 class="text-3xl font-bold">LifeAI</h1>
                        <p>Global AI Life Assistant</p>
                    </div>
                </div>
                <button onclick="toggleDark()" class="text-3xl">🌙</button>
            </div>
        </header>

        <div class="flex border-b mb-6">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Calendar</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Report</button>
            <button onclick="switchTab(3)" class="flex-1 py-4" id="tab3">More</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let streak = parseInt(localStorage.getItem('streak')) || 7;

        function saveData() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('streak', streak);
        }

        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            if (n === 0) {
                content.innerHTML = `
                    <button onclick="addTaskVoice()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl mb-6">🎤 Speak to Add Task</button>
                    <div id="task-list" class="space-y-3"></div>
                `;
                renderTasks();
            } else if (n === 1) {
                content.innerHTML = `<p class="text-center py-12 text-gray-500">📅 Calendar View (Demo)</p>`;
            } else if (n === 2) {
                content.innerHTML = `<div class="bg-white dark:bg-gray-800 p-8 rounded-3xl text-center"><h2 class="text-2xl font-bold">Monthly Summary</h2><p>Tasks completed this month: ${tasks.filter(t=>t.done).length}</p></div>`;
            } else {
                content.innerHTML = `
                    <button onclick="exportData()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl mb-4">Export Data</button>
                    <button onclick="alert('Share achievements coming soon!')" class="w-full py-4 bg-blue-600 text-white rounded-3xl">Share Achievements</button>
                `;
            }
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map((t,i) => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})">
                        <span class="${t.done?'line-through text-gray-400':''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-red-500">🗑</button>
                </div>
            `).join('');
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            saveData();
            renderTasks();
        }

        function deleteTask(i) {
            if(confirm("Delete this task?")) {
                tasks.splice(i,1);
                saveData();
                renderTasks();
            }
        }

        function addTaskVoice() {
            const text = prompt("Speak your task:");
            if(text) {
                tasks.push({text, done:false});
                saveData();
                renderTasks();
            }
        }

        function exportData() {
            const dataStr = JSON.stringify({tasks, streak}, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'lifeai_backup.json';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
