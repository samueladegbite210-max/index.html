<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;:&quot;LifeAI&quot;,
        &quot;short_name&quot;:&quot;LifeAI&quot;,
        &quot;start_url&quot;:&quot;.&quot;,
        &quot;display&quot;:&quot;standalone&quot;,
        &quot;background_color&quot;:&quot;#10b981&quot;,
        &quot;theme_color&quot;:&quot;#10b981&quot;,
        &quot;icons&quot;:[{&quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/10473/10473455.png&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;}]
    }">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-gradient-to-r from-emerald-700 to-teal-600 p-6 rounded-3xl text-white mb-8 shadow-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-4xl">🧠</div>
                    <div>
                        <h1 class="text-4xl font-bold">LifeAI</h1>
                        <p class="text-emerald-100 text-sm">Global AI Life Assistant</p>
                    </div>
                </div>
                <button onclick="toggleDark()" class="text-3xl">🌙</button>
            </div>
        </header>

        <div class="flex border-b mb-8">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Budget</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Goals</button>
        </div>

        <div id="content"></div>

        <!-- Share Button -->
        <button onclick="shareApp()" class="fixed bottom-6 right-6 bg-emerald-600 text-white w-14 h-14 rounded-2xl shadow-xl flex items-center justify-center text-2xl">
            <i class="fas fa-share-alt"></i>
        </button>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            if (n === 0) {
                content.innerHTML = `
                    <button onclick="addTask()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl mb-6">+ New Task</button>
                    <div id="task-list" class="space-y-3"></div>
                `;
                renderTasks();
            } else if (n === 1) {
                content.innerHTML = `<p class="text-center py-12 text-gray-500">Budget coming soon</p>`;
            } else {
                content.innerHTML = `<p class="text-center py-12 text-gray-500">Goals coming soon</p>`;
            }
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map((t,i) => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})">
                        <span class="${t.done?'line-through text-gray-400':''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-red-500">🗑</button>
                </div>
            `).join('');
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            saveTasks();
            renderTasks();
        }

        function deleteTask(i) {
            if(confirm("Delete task?")) {
                tasks.splice(i,1);
                saveTasks();
                renderTasks();
            }
        }

        function addTask() {
            const text = prompt("New task?");
            if(text) {
                tasks.push({text, done:false});
                saveTasks();
                renderTasks();
            }
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'LifeAI - AI Life Assistant',
                    text: 'Download this free AI Life Assistant app!',
                    url: window.location.href
                });
            } else {
                alert('Share this link: ' + window.location.href);
            }
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
