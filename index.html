<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-4xl font-bold text-green-700 mb-8">LifeAI</h1>

        <button onclick="addTask()" class="w-full py-4 bg-green-600 text-white rounded-3xl mb-8">+ New Task</button>

        <div id="task-list" class="space-y-4"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map((task, i) => `
                <div class="bg-white p-5 rounded-3xl flex items-center gap-4">
                    <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${i})" class="w-6 h-6">
                    <span class="${task.done ? 'line-through text-gray-400' : ''}">${task.text}</span>
                </div>
            `).join('');
        }

        function addTask() {
            const text = prompt("What is the new task?");
            if (text && text.trim() !== "") {
                tasks.push({text: text.trim(), done: false});
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Initial render
        renderTasks();
    </script>
</body>
</html>
