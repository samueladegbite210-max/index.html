<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

textarea{
    width:100%;
    height:250px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    resize:none;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}
</style>

</head>

<body>

<header>
📝 Notes
</header>

<div class="container">

<input
type="text"
id="noteTitle"
placeholder="📝 Note Title">

<textarea
id="notes"
placeholder="Write your note here..."></textarea>

<button onclick="saveNote()">
💾 Save Note
</button>

<hr>

<input
type="text"
id="searchNote"
placeholder="🔍 Search notes...">

<div id="notesList"></div>

<button onclick="clearNote()">
🗑 Clear Note
</button>

</div>

<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

<script>

const notes = document.getElementById("notes");

notes.value = localStorage.getItem("notes") || "";

function saveNote(){

    const title = document.getElementById("noteTitle").value.trim();
    const content = notes.value.trim();

    if(title === "" || content === ""){

        alert("Please enter a title and note.");

        return;

    }

    let allNotes = JSON.parse(localStorage.getItem("allNotes")) || [];

    allNotes.push({
        id: Date.now(),
        title: title,
        content: content
    });

    localStorage.setItem("allNotes", JSON.stringify(allNotes));

    document.getElementById("noteTitle").value = "";
    notes.value = "";

    loadNotes();

    alert("✅ Note Saved!");

}

notes.addEventListener("input", function(){

    localStorage.setItem("notes", notes.value);

});

document.addEventListener("keydown", function(event){

    if((event.ctrlKey || event.metaKey) && event.key === "s"){

        event.preventDefault();

        saveNote();

    }

});
    function loadNotes(){

    const container = document.getElementById("notesList");

    if(!container) return;

    let allNotes = JSON.parse(localStorage.getItem("allNotes")) || [];

    container.innerHTML = "";

    allNotes.reverse().forEach(function(note){

        container.innerHTML += `
        <div class="card">

            <h3>${note.title}</h3>

            <p>${note.content}</p>

            <button onclick="editNote(${note.id})">
            ✏️ Edit
            </button>

            <button onclick="deleteNote(${note.id})">
            🗑 Delete
            </button>

        </div>
        
        `;

    });

}
    document.getElementById("searchNote").addEventListener("input", function(){

    const keyword = this.value.toLowerCase();

    let allNotes =
        JSON.parse(localStorage.getItem("allNotes")) || [];

    const container =
        document.getElementById("notesList");

    container.innerHTML = "";

    allNotes
        .reverse()
        .filter(function(note){

            return (
                note.title.toLowerCase().includes(keyword) ||
                note.content.toLowerCase().includes(keyword)
            );

        })
        .forEach(function(note){

            container.innerHTML += `
            <div class="card">

                <h3>${note.title}</h3>

                <p>${note.content}</p>

                <button onclick="editNote(${note.id})">
                ✏️ Edit
                </button>

                <button onclick="deleteNote(${note.id})">
                🗑 Delete
                </button>

            </div>
            `;

        });

});
    function clearNote(){

    if(confirm("Delete current note?")){

        document.getElementById("noteTitle").value = "";
        notes.value = "";

    }

}
    function editNote(id){

    let allNotes =
        JSON.parse(localStorage.getItem("allNotes")) || [];

    const note = allNotes.find(function(n){

        return n.id === id;

    });

    if(!note) return;

    document.getElementById("noteTitle").value = note.title;

    document.getElementById("notes").value = note.content;

    deleteNote(id);

}

function deleteNote(id){

    if(!confirm("🗑 Delete this note?")){
        return;
    }

    let allNotes =
        JSON.parse(localStorage.getItem("allNotes")) || [];

    allNotes = allNotes.filter(function(note){

        return note.id !== id;

    });

    localStorage.setItem("allNotes", JSON.stringify(allNotes));

    loadNotes();

}
    loadNotes();

</script>

</body>
</html>
