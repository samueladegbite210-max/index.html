<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

textarea{
    width:100%;
    height:250px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    resize:none;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}
</style>

</head>

<body>

<header>
📝 Notes
</header>

<div class="container">

<textarea
id="notes"
placeholder="Write your notes here..."></textarea>
<input
type="text"
id="searchNote"
placeholder="🔍 Search notes..."
style="margin-top:15px;">
<button onclick="saveNote()">
Save Note
</button>

</div>
<button onclick="clearNote()">
🗑 Clear Note
</button>
<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

<script>

const notes = document.getElementById("notes");

notes.value = localStorage.getItem("notes") || "";

function saveNote(){

    localStorage.setItem("notes", notes.value);

    alert("✅ Note Saved!");

    notes.focus();

}

notes.addEventListener("input", function(){

    localStorage.setItem("notes", notes.value);

});

document.addEventListener("keydown", function(event){

    if((event.ctrlKey || event.metaKey) && event.key === "s"){

        event.preventDefault();

        saveNote();

    }

});
    

</script>

</body>
</html>
