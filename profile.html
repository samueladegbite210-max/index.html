<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.profile-card{
    background:#1F2937;
    padding:20px;
    margin-top:20px;
    border-radius:15px;
    line-height:1.8;
}

.profile-card h2{
    margin-bottom:15px;
    color:#60A5FA;
}
</style>

</head>

<body>

<header class="header">

    <h1>👤 My Profile</h1>

    <p>Manage your AI Life Assistant account</p>

</header>

<div class="container">

    <div class="card">

        <div class="profile-avatar">

            👤

        </div>

<input
    type="text"
    id="profileName"
    placeholder="Enter your name">

<button onclick="saveProfile()">
    💾 Save Profile
</button>
        <p>⭐ AI Life Explorer</p>

    </div>

    <div class="summary">

        <div class="card">

            <h2 id="taskCountProfile">0</h2>

            <p>Tasks</p>

        </div>

        <div class="card">

            <h2 id="goalCountProfile">0</h2>

            <p>Goals</p>

        </div>

        <div class="card">

            <h2 id="eventCountProfile">0</h2>

            <p>Events</p>

        </div>

    </div>

    <div class="card">

        <h3>🔥 Daily Streak</h3>

        <h2 id="streakProfile">0 Days</h2>

    </div>

    <div class="card">

        <h3>📈 Productivity</h3>

        <h2 id="productivityProfile">0%</h2>

    </div>

    <div class="card">

        <button class="button">
            ⚙️ Settings
        </button>

        <button class="button">
            🌙 Dark Mode
        </button>

        <button class="button">
            ℹ️ About App
        </button>

    </div>

</div>

<div class="navbar">

<a href="dashboard.html">🏠<br>Home</a>

<a href="chat.html">🤖<br>AI</a>

<a href="tasks.html">✅<br>Tasks</a>

<a href="goals.html">🎯<br>Goals</a>

<a href="profile.html">👤<br>Profile</a>

</div>

<script src="dashboard.js"></script>

    

</body>
</html>
