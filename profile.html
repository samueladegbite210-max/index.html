<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - AI Life Assistant</title>
<link rel="stylesheet" href="style.css">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}
</style>
</head>

<body>

<header>
👤 My Profile
</header>

<div class="container">

<input
id="name"
placeholder="Enter your name">

<button onclick="saveProfile()">
Save Profile
</button>

</div>

<script>

const nameInput = document.getElementById("name");

nameInput.value = localStorage.getItem("username") || "";

function saveProfile(){

localStorage.setItem("username", nameInput.value);

alert("✅ Profile Saved!");

}

</script>

    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>
</body>
    
</html>
